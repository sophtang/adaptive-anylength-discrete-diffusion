<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A2D2 — Adaptive Joint Decoding (Hero)</title>
<style>
  :root{
    --accent:#6B67EE; --accent-2:#9793F8; --bg:#F7F7FF; --bg2:#EAE9FF;
    --good:#1Fae74; --bad:#E0556B; --ink:#2b2b40; --muted:#6f6f8a;
    --card-w:58px; --card-h:50px; --gap:6px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:'Lora',Georgia,serif;
    background:transparent;
    color:var(--ink); display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:24px;
  }
  .stage{width:min(900px,100%); text-align:center}
  .title{font-size:1.15rem;font-weight:600;letter-spacing:.01em;margin:0 0 2px}
  .sub{font-size:.92rem;color:var(--muted);margin:0 0 18px}

  .track-wrap{
    background:linear-gradient(180deg,#fff, var(--bg2));
    border:1.5px solid var(--accent-2); border-radius:18px;
    padding:26px 18px 22px; box-shadow:0 18px 40px -24px rgba(107,103,238,.55);
  }
  .track{
    display:flex; align-items:center; justify-content:center;
    gap:12px var(--gap); min-height:calc(var(--card-h) + 26px); flex-wrap:wrap;
    perspective:1200px;
  }

  /* each slot animates width for insert/remove */
  .slot{
    width:var(--card-w); flex:0 0 var(--card-w);
    transition:width .42s cubic-bezier(.2,.8,.2,1),
               opacity .42s ease, transform .42s ease, margin .42s ease;
    position:relative;
  }
  .slot.collapsing{width:0;opacity:0;margin-left:calc(var(--gap)/-1);transform:scale(.4)}
  .slot.inserting{animation:pop .42s cubic-bezier(.2,1.3,.3,1)}
  @keyframes pop{from{transform:translateY(-10px) scale(.7);opacity:0}to{transform:none;opacity:1}}

  .card{
    width:var(--card-w); height:var(--card-h); position:relative;
    transform-style:preserve-3d; transition:transform .5s cubic-bezier(.4,.05,.2,1);
    border-radius:9px;
  }
  .card.revealed{transform:rotateY(180deg)}
  .face{
    position:absolute; inset:0; backface-visibility:hidden; border-radius:9px;
    display:flex; align-items:center; justify-content:center; font-weight:700;
    box-shadow:0 6px 14px -8px rgba(40,40,80,.5);
  }
  .back{
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.18) 0 6px, transparent 6px 12px),
      linear-gradient(160deg, var(--accent), #4c48c9);
    color:#fff; font-size:1.2rem; border:1.5px solid #ffffff66;
  }
  .front{
    transform:rotateY(180deg); background:#fff; color:var(--accent);
    border:1.6px solid var(--accent-2); font-size:.72rem; overflow:hidden; padding:0 2px;
    font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace; font-weight:700;
  }
  /* quality glow states applied to .slot */
  .slot .ring{
    position:absolute; inset:-5px; border-radius:13px; pointer-events:none;
    opacity:0; transition:opacity .3s ease; box-shadow:0 0 0 2px transparent;
  }
  .slot.q-good .ring{opacity:1; box-shadow:0 0 16px 1px rgba(31,174,116,.65), 0 0 0 2px var(--good)}
  .slot.q-bad  .ring{opacity:1; box-shadow:0 0 18px 2px rgba(224,85,107,.7), 0 0 0 2px var(--bad)}
  .qscore{
    position:absolute; top:-20px; left:50%; transform:translateX(-50%);
    font-size:.62rem; font-weight:700; padding:1px 5px; border-radius:6px;
    color:#fff; opacity:0; transition:opacity .25s ease; white-space:nowrap;
  }
  .slot.q-good .qscore{opacity:1;background:var(--good)}
  .slot.q-bad  .qscore{opacity:1;background:var(--bad)}

  /* poisson insertion counter floating above a gap */
  .pois{
    position:absolute; top:-22px; left:50%; transform:translateX(-50%);
    font-size:.6rem; color:var(--accent); font-weight:700; opacity:0;
    transition:opacity .25s ease;
  }
  .slot.show-pois .pois{opacity:1}

  .status{
    margin-top:16px; height:1.4em; font-size:.95rem; color:var(--accent);
    font-weight:600; letter-spacing:.01em;
  }
  .legend{display:flex;gap:18px;justify-content:center;margin-top:14px;flex-wrap:wrap;
          font-size:.78rem;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:11px;height:11px;border-radius:3px;display:inline-block}
</style>
</head>
<body>
  <div class="stage">
    <div class="track-wrap">
      <div class="track" id="track"></div>
    </div>

    <div class="status" id="status">Starting from an empty sequence…</div>

    <div class="legend">
      <span><i class="dot" style="background:linear-gradient(160deg,#6B67EE,#4c48c9)"></i> mask <code>[M]</code></span>
      <span><i class="dot" style="background:#fff;border:1.5px solid #9793F8"></i> decoded token</span>
      <span><i class="dot" style="background:#1Fae74"></i> high quality &rarr; keep</span>
      <span><i class="dot" style="background:#E0556B"></i> low quality &rarr; re-mask / drop</span>
    </div>

  </div>

<script>
const TRACK  = document.getElementById('track');
const STATUS = document.getElementById('status');

// An actual tokenized peptide-residue SMILES fragment (26 tokens)
const TARGET = ['N','[C@@H]','(','C','c','1','c','[nH]','c','2','c','1','c','(','O',')','c','c','c','2',')','C','(','=','O',')'];
const TARGET_LEN = TARGET.length;   // 26
const SPEED=0.95;  // global playback scale (higher = slower, calmer pacing)
const sleep=ms=>new Promise(r=>setTimeout(r,ms*SPEED));

let uid = 0;
// model state: array of slot objects {id, el, card, state:'mask'|'token', char}
let slots = [];

function makeSlot(state, char){
  const id = ++uid;
  const slot = document.createElement('div');
  slot.className = 'slot inserting';
  slot.innerHTML = `
    <div class="pois"></div>
    <div class="qscore"></div>
    <div class="ring"></div>
    <div class="card">
      <div class="face back">🃏</div>
      <div class="face front"></div>
    </div>`;
  const card  = slot.querySelector('.card');
  const front = slot.querySelector('.front');
  const obj = {id, el:slot, card, front, state, char:char||''};
  if(state==='token'){ front.textContent=char; card.classList.add('revealed'); }
  setTimeout(()=>slot.classList.remove('inserting'),420);
  return obj;
}

function setStatus(t){ STATUS.textContent = t; }

const shuffle = a => { for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };
let placed = new Set();   // target positions that already have a slot

// Each slot carries its target position (tpos); slots[] is kept sorted by tpos and the
// DOM order matches, so a mask can be inserted into ANY gap while every revealed token
// stays pinned to the correct token for its position (it never silently changes).
function placeSlot(o){
  const idx = slots.findIndex(s => s.tpos > o.tpos);
  if(idx === -1){ slots.push(o); TRACK.appendChild(o.el); }
  else { const ref = slots[idx].el; slots.splice(idx,0,o); TRACK.insertBefore(o.el, ref); }
}

async function insertMasks(){
  const remaining = [];
  for(let i=0;i<TARGET_LEN;i++) if(!placed.has(i)) remaining.push(i);
  if(!remaining.length) return;
  setStatus('1. Adaptive insertion: insert masked slots into gaps anywhere (the sequence grows to any length)');
  let budget = Math.min(7, remaining.length);
  budget = Math.max(2, Math.round(budget*(0.5+Math.random()*0.5)));
  budget = Math.min(budget, remaining.length);
  // pick random target positions so insertions appear in the middle, not only at the end
  const chosen = shuffle(remaining.slice()).slice(0,budget).sort((a,b)=>a-b);
  for(const tp of chosen){
    const ns = makeSlot('mask'); ns.tpos = tp; placed.add(tp);
    ns.el.classList.add('show-pois');
    ns.el.querySelector('.pois').textContent = '+'+(1+Math.floor(Math.random()*2));
    placeSlot(ns);
    await sleep(120);
    setTimeout(()=>ns.el.classList.remove('show-pois'),700);
  }
  await sleep(420);
}

// Adaptive unmasking (faithful to A2D2): (a) unmask masked slots in parallel, (b) predict the
// unmasking quality μ on those just-unmasked tokens, (c) re-mask the low-quality ones so they are
// decoded again in a later step. Tokens that pass quality are committed and never change.
async function unmaskStep(force=false){
  const masks = slots.filter(s => s.state==='mask' && Number.isInteger(s.tpos));
  if(!masks.length) return;
  const acting = force ? masks : masks.filter(()=> Math.random() < 0.92);
  if(!acting.length) return;

  // (a) unmask in parallel — every slot decodes to its correct token for this position, so an
  // unmasked token never displays a wrong value (and therefore never "switches" to another value).
  setStatus('2. Unmask several masked slots in parallel');
  acting.forEach(s=>{
    s.char = TARGET[s.tpos];
    s.state='token'; s.front.textContent=s.char; s.card.classList.add('revealed');
  });
  await sleep(600);

  // (b) predict unmasking quality μ on the tokens we just unmasked; flag a few as low-confidence
  setStatus('3. Quality predictor scores each unmasked token (μ)');
  acting.forEach(s=>{
    s.lowq = !force && !s.confirmed && Math.random() < 0.18;
    s.q = s.lowq ? (0.12+Math.random()*0.22) : (0.80+Math.random()*0.19);
    s.el.querySelector('.qscore').textContent = s.q.toFixed(2);
    s.el.classList.add(s.lowq ? 'q-bad' : 'q-good');
  });
  await sleep(680);

  // (c) re-mask the low-quality tokens; on a later step they are re-decoded (and confirmed). Every
  // token is settled, so re-decoding yields the SAME correct token — no value ever changes.
  const low = acting.filter(s=>s.lowq);
  acting.forEach(s=> s.confirmed = true);
  if(low.length){
    setStatus('4. Re-mask the low-quality tokens — they are decoded again in a later step');
    low.forEach(s=>{ s.card.classList.remove('revealed'); s.state='mask'; s.front.textContent=''; });
    await sleep(640);
  }
  acting.forEach(s=>s.el.classList.remove('q-good','q-bad'));   // clear score glows
  await sleep(120);
}

// Insertion quality (ν): propose a spurious masked slot in a gap, score it low, and remove it WHILE
// still masked — it is never flipped, so it never becomes part of the sequence. Runs throughout.
async function insertionQualityDemo(){
  const base = slots.filter(s => Number.isInteger(s.tpos));
  if(!base.length) return;
  setStatus('Adaptive insertion proposes an extra masked slot in a gap…');
  const ref = base[Math.floor(Math.random()*base.length)];
  const cand = makeSlot('mask');
  cand.tpos = ref.tpos + 0.5;                       // fractional -> sits in a gap, claims no real position
  placeSlot(cand);
  await sleep(560);
  cand.el.classList.add('q-bad');
  cand.el.querySelector('.qscore').textContent = (0.05+Math.random()*0.07).toFixed(2);
  setStatus('Low insertion quality (ν): the gap is already complete, so the slot is removed before it is ever decoded');
  await sleep(980);
  cand.el.classList.add('collapsing'); await sleep(440);
  cand.el.remove(); slots = slots.filter(s=>s!==cand);
  await sleep(200);
}

function done(){
  if(placed.size < TARGET_LEN) return false;
  return slots.every(s => !Number.isInteger(s.tpos) || s.state==='token');
}

async function finish(){
  STATUS.innerHTML = '✓ Valid residue: <code style="font-family:ui-monospace,Menlo,monospace;color:#4c48c9;font-size:.92em">'+TARGET.join('')+'</code>';
  slots.forEach((s,i)=>setTimeout(()=>{
    s.el.classList.add('q-good');
    s.el.querySelector('.qscore').textContent='';
  }, i*40));
  await sleep(2000);
  slots.forEach(s=>s.el.classList.remove('q-good'));
}

async function reset(){
  setStatus('Resetting…');
  await sleep(300);
  for(const s of slots){ s.el.classList.add('collapsing'); }
  await sleep(450);
  TRACK.innerHTML=''; slots=[]; uid=0; placed=new Set();
  await sleep(300);
}

async function run(){
  let step=0;
  while(true){
    await insertMasks();
    // demonstrate a low-quality insertion that gets removed — interspersed throughout, not just at the end
    if(!done() && Math.random() < 0.5) await insertionQualityDemo();
    await unmaskStep();
    step++;
    if(done() || step>18){
      let guard=0;
      while(!done() && guard++<20){
        if(placed.size < TARGET_LEN) await insertMasks();
        if(!done() && Math.random() < 0.4) await insertionQualityDemo();
        await unmaskStep(true);   // force-commit any remaining masks to finish the cycle
      }
      await insertionQualityDemo();   // one more removal before completing
      await finish();
      await reset();
      step=0;
    }
    await sleep(260);
  }
}
run();
</script>
</body>
</html>
